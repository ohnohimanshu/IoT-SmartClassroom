{% extends "entrance_cam/base.html" %}
{% block title %}Delete {{ type }}{% endblock %}
{% block page_title %}Delete {{ type }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="form-card text-center">
      <div style="width:64px;height:64px;background:#fee2e2;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <i class="bi bi-trash-fill fs-3" style="color:#dc2626"></i>
      </div>
      <h5 class="fw-700 mb-2">Delete {{ type }}?</h5>
      <p class="text-muted mb-4">You are about to delete <strong>{{ obj }}</strong>. This action cannot be undone.</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2 justify-content-center">
          <button type="submit" class="btn" style="background:#dc2626;color:#fff;border:none;border-radius:10px;padding:10px 28px;font-weight:600">
            <i class="bi bi-trash me-1"></i>Yes, Delete
          </button>
          <a href="javascript:history.back()" class="btn" style="background:#f1f5f9;color:#64748b;border:none;border-radius:10px;padding:10px 28px">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
