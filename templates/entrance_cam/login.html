<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ClassroomIoT</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e40af 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: #fff; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .login-logo { width: 56px; height: 56px; background: linear-gradient(135deg,#4f46e5,#06b6d4); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .form-control { border-radius: 10px; padding: 10px 14px; border: 1.5px solid #e2e8f0; }
  .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
  .btn-login { background: linear-gradient(135deg,#4f46e5,#06b6d4); border: none; border-radius: 10px; padding: 11px; font-weight: 600; color: #fff; }
  .btn-login:hover { opacity: 0.9; color: #fff; }
</style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div class="login-logo"><i class="bi bi-camera-video-fill text-white fs-4"></i></div>
    <h4 class="fw-bold" style="color:#1e1b4b">ClassroomIoT</h4>
    <p class="text-muted" style="font-size:0.85rem">Admin Dashboard · Sign in to continue</p>
  </div>
  {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-danger rounded-3 py-2">{{ msg }}</div>
    {% endfor %}
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-600 small">Username</label>
      <input type="text" name="username" class="form-control" placeholder="admin" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-600 small">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-login w-100">Sign In</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
