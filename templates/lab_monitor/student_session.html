{% extends 'lab_monitor/student_base.html' %}

{% block title %}Lab Session - Student Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div id="error-alert" class="alert alert-danger d-none mb-4" role="alert"></div>
    <div class="stat-card">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h4 class="mb-1"><i class="bi bi-laptop me-2" style="color:#4f46e5"></i> Lab Session</h4>
          <div class="d-flex align-items-center gap-3">
            <span id="session-status-dot" class="dot-online"></span>
            <span id="session-timer" class="fw-semibold">00:00:00</span>
            <span id="sharing-status" class="text-muted small">Sharing: Initializing...</span>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <div id="emotion-badge" class="emotion-badge badge-unknown">Emotion: Unknown</div>
          <div id="pose-badge" class="emotion-badge badge-unknown">Pose: Unknown</div>
        </div>
      </div>
      
      <div class="text-center mb-4">
        <button id="end-session-btn" class="btn btn-lg btn-danger">
          <i class="bi bi-stop-circle me-2"></i> End Session
        </button>
      </div>
    </div>
  </div>
</div>

<video id="camera-preview" autoplay playsinline style="position:fixed;bottom:20px;right:20px;width:160px;height:120px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:9999"></video>

{% endblock %}

{% block scripts %}
<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
// Prefer meta tag (always available server-side) over cookie (blocked by HttpOnly in some configs)
const csrftoken = document.querySelector('meta[name="csrf-token"]')?.content || getCookie('csrftoken');

let sessionId = null;
let sessionStartTime = null;
let screenStream = null;
let cameraStream = null;
let combinedStream = null;
let peerConnection = null;
let screenInterval = null;
let cameraInterval = null;
let activityInterval = null;
let timerInterval = null;
let pollingInterval = null;
let screenVideo = null;

const endSessionBtn = document.getElementById('end-session-btn');
const sessionTimer = document.getElementById('session-timer');
const sharingStatus = document.getElementById('sharing-status');
const emotionBadge = document.getElementById('emotion-badge');
const poseBadge = document.getElementById('pose-badge');
const cameraPreview = document.getElementById('camera-preview');
const errorAlert = document.getElementById('error-alert');

function showError(message) {
    errorAlert.textContent = message;
    errorAlert.classList.remove('d-none');
    console.error(message);
}

async function startSession() {
    try {
        const response = await fetch('/lab/session/start/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrftoken,
                'Content-Type': 'application/json'
            }
        });
        const data = await response.json();
        if (data.status === 'success') {
            sessionId = data.session_id;
            sessionStartTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            await startSharing();
        } else {
            showError(data.message || 'Failed to start session');
        }
    } catch (e) {
        showError('Failed to start session: ' + e.message);
    }
}

function updateTimer() {
    const elapsed = Date.now() - sessionStartTime;
    const hours = Math.floor(elapsed / 3600000);
    const minutes = Math.floor((elapsed % 3600000) / 60000);
    const seconds = Math.floor((elapsed % 60000) / 1000);
    sessionTimer.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

async function startSharing() {
    try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: { mediaSource: 'screen' }
        });
        
        screenVideo.srcObject = screenStream;
        
        sharingStatus.textContent = 'Sharing: Screen + Camera';
        
        await new Promise(resolve => setTimeout(resolve, 1000));
        screenInterval = setInterval(captureScreen, 2000);
        
        sharingStatus.textContent = 'Sharing: Screen + Camera (Capturing)';
    } catch (e) {
        console.error('Screen sharing failed:', e);
        showError('Screen sharing failed: ' + e.message);
        sharingStatus.textContent = 'Sharing: Camera Only';
    }
    
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
        cameraPreview.srcObject = cameraStream;
        await new Promise(resolve => setTimeout(resolve, 1000));
        cameraInterval = setInterval(captureCamera, 3000);  // every 3s — gives server time to process
    } catch (e) {
        console.error('Camera access failed:', e);
        showError('Camera access failed: ' + e.message);
    }
    
    activityInterval = setInterval(logActivity, 5000);
    
    if (screenStream && cameraStream) {
        await startWebRTC();
    }
    
    pollingInterval = setInterval(pollForStudentWebrtc, 2000);
}

async function pollForStudentWebrtc() {
    try {
        const response = await fetch(`/lab/api/session/${sessionId}/student-webrtc/`);
        const data = await response.json();
        
        if (data.webrtc_answer && !peerConnection.remoteDescription) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.webrtc_answer));
            console.log('WebRTC answer received and set');
        }
        
        if (data.webrtc_ice_candidates_admin) {
            for (const candidate of data.webrtc_ice_candidates_admin) {
                if (!candidate || !peerConnection.remoteDescription) continue;
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                } catch (e) {
                    console.error('Error adding admin ICE candidate:', e);
                }
            }
        }
    } catch (e) {
        console.error('Error polling for student webrtc:', e);
    }
}

async function startWebRTC() {
    try {
        peerConnection = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        // Use separate named streams so the admin side can tell them apart.
        // stream.id is set by us and IS readable on the remote side via event.streams[0].id
        const screenMediaStream = new MediaStream();
        screenMediaStream._label = 'screen'; // local hint only
        const cameraMediaStream = new MediaStream();
        cameraMediaStream._label = 'camera';

        if (screenStream) {
            screenStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, screenMediaStream);
            });
        }

        if (cameraStream) {
            cameraStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, cameraMediaStream);
            });
        }

        peerConnection.onicecandidate = async (event) => {
            if (event.candidate) {
                try {
                    await fetch(`/lab/api/session/${sessionId}/webrtc/ice/`, {
                        method: 'POST',
                        headers: { 'X-CSRFToken': csrftoken, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ candidate: event.candidate, role: 'student' })
                    });
                } catch (e) {
                    console.error('Error sending ICE candidate:', e);
                }
            }
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        // Embed stream labels in the SDP so the admin side knows which is which.
        // We pass them as metadata alongside the offer.
        await fetch(`/lab/api/session/${sessionId}/webrtc/offer/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': csrftoken, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                offer: peerConnection.localDescription,
                screen_stream_id: screenMediaStream.id,
                camera_stream_id: cameraMediaStream.id,
            })
        });

        console.log('WebRTC offer sent');
    } catch (e) {
        console.error('WebRTC setup failed:', e);
    }
}

async function captureScreen() {
    if (!screenStream || !screenVideo || !sessionId) {
        console.log('Skipping screenshot: missing stream or video or sessionId');
        return;
    }
    try {
        const canvas = document.createElement('canvas');
        canvas.width = screenVideo.videoWidth;
        canvas.height = screenVideo.videoHeight;
        if (canvas.width === 0 || canvas.height === 0) {
            console.warn('Screen video has zero dimensions, skipping screenshot');
            return;
        }
        const ctx = canvas.getContext('2d');
        ctx.drawImage(screenVideo, 0, 0, canvas.width, canvas.height);
        const imageB64 = canvas.toDataURL('image/jpeg', 0.7);
        
        console.log('Capturing screenshot, size:', imageB64.length);
        
        const response = await fetch('/lab/screenshot/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrftoken,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                session_id: sessionId,
                image_b64: imageB64,
                tab_title: document.title
            })
        });
        
        const result = await response.json();
        console.log('Screenshot upload result:', result);
    } catch (e) {
        console.error('Screenshot capture failed:', e);
    }
}

async function captureCamera() {
    if (!cameraStream || !sessionId) return;
    // Don't capture if video hasn't loaded yet
    if (!cameraPreview.videoWidth || cameraPreview.videoWidth === 0) return;
    try {
        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(cameraPreview, 0, 0, canvas.width, canvas.height);
        const imageB64 = canvas.toDataURL('image/jpeg', 0.8);  // higher quality for better detection
        
        console.log('Capturing camera frame');
        
        const response = await fetch('/lab/camera-frame/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrftoken,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                session_id: sessionId,
                image_b64: imageB64
            })
        });
        const data = await response.json();
        
        console.log('Camera frame result:', data);
        
        updateEmotionBadge(data.emotion);
        updatePoseBadge(data.pose);
    } catch (e) {
        console.error('Camera capture failed:', e);
    }
}

async function logActivity() {
    if (!sessionId) return;
    try {
        await fetch('/lab/activity/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrftoken,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                session_id: sessionId,
                tab_title: document.title,
                activity_type: 'active'
            })
        });
    } catch (e) {
        console.error('Activity log failed:', e);
    }
}

function updateEmotionBadge(emotion) {
    emotionBadge.className = `emotion-badge badge-${emotion}`;
    emotionBadge.textContent = `Emotion: ${emotion.charAt(0).toUpperCase() + emotion.slice(1)}`;
}

function updatePoseBadge(pose) {
    poseBadge.className = 'emotion-badge badge-neutral';
    let poseText = 'Pose: ';
    if (pose === 'focused') poseText += 'Focused';
    else if (pose === 'looking_away') poseText += 'Looking Away';
    else if (pose === 'head_down') poseText += 'Head Down';
    else poseText += 'Unknown';
    poseBadge.textContent = poseText;
}

async function endSession() {
    console.log('Ending session, sessionId:', sessionId);
    if (!sessionId) {
        alert('No active session to end');
        window.location.href = '/student/dashboard/';
        return;
    }
    
    clearInterval(screenInterval);
    clearInterval(cameraInterval);
    clearInterval(activityInterval);
    clearInterval(timerInterval);
    clearInterval(pollingInterval);
    
    if (screenStream) {
        screenStream.getTracks().forEach(track => track.stop());
        screenStream = null;
    }
    if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
    }
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }
    
    try {
        const response = await fetch('/lab/session/end/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrftoken,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ session_id: sessionId })
        });
        const data = await response.json();
        console.log('Session end response:', data);
    } catch (e) {
        console.error('Error ending session:', e);
    }
    
    window.location.href = '/student/dashboard/';
}

endSessionBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    await endSession();
});
window.addEventListener('beforeunload', (e) => {
    if (sessionId) {
        e.preventDefault();
        navigator.sendBeacon('/lab/session/end/', JSON.stringify({ session_id: sessionId }));
    }
});

window.onload = async () => {
    screenVideo = document.createElement('video');
    screenVideo.autoplay = true;
    screenVideo.playsInline = true;
    screenVideo.muted = true;
    screenVideo.style.position = 'absolute';
    screenVideo.style.top = '-9999px';
    screenVideo.style.left = '-9999px';
    document.body.appendChild(screenVideo);
    
    await startSession();
};
</script>
{% endblock %}
