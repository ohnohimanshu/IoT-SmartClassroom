<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Student Portal - ClassroomIoT{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  :root {
    --primary: #4f46e5;
    --primary-dark: #3730a3;
    --accent: #06b6d4;
  }
  body { background: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
  
  .topbar {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    box-shadow: 0 2px 12px rgba(79, 70, 229, 0.3);
  }
  .topbar .navbar-brand { color: #fff; font-weight: 700; }
  .topbar .nav-link { color: rgba(255,255,255,0.85); }
  .topbar .nav-link:hover { color: #fff; }
  
  .content-area { padding: 24px; }
  
  .stat-card {
    background: #fff; border-radius: 12px; padding: 20px;
    border: 1px solid #e2e8f0;
  }
  .data-table { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
  .data-table .table { margin: 0; }
  
  .badge-happy    { background:#dcfce7; color:#166534; }
  .badge-sad      { background:#dbeafe; color:#1e40af; }
  .badge-angry    { background:#fee2e2; color:#991b1b; }
  .badge-neutral  { background:#f1f5f9; color:#475569; }
  .badge-surprise { background:#fef9c3; color:#854d0e; }
  .badge-fear     { background:#fce7f3; color:#9d174d; }
  .badge-disgust  { background:#f3e8ff; color:#6b21a8; }
  .badge-unknown  { background:#f1f5f9; color:#94a3b8; }
  .emotion-badge  { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
</style>
</head>
<body>

<nav class="navbar topbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'student_dashboard' %}">
      <i class="bi bi-camera-video-fill me-2"></i> ClassroomIoT
    </a>
    <div class="ms-auto d-flex align-items-center gap-3">
      {% if user.is_authenticated %}
        <span class="text-white small">{{ user.first_name }} {{ user.last_name }}</span>
        <a href="{% url 'student_logout' %}" class="btn btn-sm btn-light">
          <i class="bi bi-box-arrow-right me-1"></i> Logout
        </a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="content-area">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
