<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login - ClassroomIoT</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { 
    background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%); 
    min-height: 100vh; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }
  .login-card {
    background: #fff;
    border-radius: 16px;
    padding: 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    width: 100%;
    max-width: 400px;
  }
  .login-card h4 { font-weight: 700; color: #1e293b; margin-bottom: 8px; }
  .login-card p { color: #64748b; font-size: 0.875rem; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div style="background:linear-gradient(135deg,#4f46e5,#06b6d4);width:56px;height:56px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center">
      <i class="bi bi-camera-video-fill" style="color:#fff;font-size:1.5rem"></i>
    </div>
  </div>
  <h4 class="text-center">Student Portal</h4>
  <p class="text-center">Sign in with your roll number</p>
  
  {% if error %}
  <div class="alert alert-danger small" role="alert">{{ error }}</div>
  {% endif %}
  
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label small">Roll Number</label>
      <input type="text" name="username" class="form-control" placeholder="Enter your roll number" required>
    </div>
    <div class="mb-4">
      <label class="form-label small">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn w-100" style="background:linear-gradient(135deg,#4f46e5,#06b6d4);color:#fff;border:none;padding:10px">
      <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
